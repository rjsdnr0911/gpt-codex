<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Voxel Frontier, a browser-based 3D voxel sandbox."
    />
    <title>Voxel Frontier</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      void (async () => {
        const isGitHubPages = location.hostname === "rjsdnr0911.github.io";

        if (isGitHubPages) {
          const stylesheet = document.createElement("link");
          stylesheet.rel = "stylesheet";
          stylesheet.href = "/gpt-codex/assets/index.css";
          document.head.append(stylesheet);

          const script = document.createElement("script");
          script.type = "module";
          script.src = "/gpt-codex/assets/main.js";
          document.body.append(script);
        } else {
          await import("/src/main.ts");
        }
      })();
    </script>
  </body>
</html>
