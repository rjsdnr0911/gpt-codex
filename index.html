<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Codex Craft, a browser-based Korean 3D voxel survival sandbox."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23212121'/%3E%3Cpath d='M8 8h48v22H8z' fill='%2369a84f'/%3E%3Cpath d='M8 30h48v26H8z' fill='%23563b2a'/%3E%3Cpath d='M16 16h10v8H16zM38 35h10v9H38z' fill='%23b4d66d'/%3E%3C/svg%3E"
    />
    <title>Codex Craft</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      void (async () => {
        const isGitHubPages = location.hostname === "rjsdnr0911.github.io";

        if (isGitHubPages) {
          const stylesheet = document.createElement("link");
          stylesheet.rel = "stylesheet";
          stylesheet.href = "/gpt-codex/assets/index.css";
          document.head.append(stylesheet);

          const script = document.createElement("script");
          script.type = "module";
          script.src = "/gpt-codex/assets/main.js";
          document.body.append(script);
        } else {
          await import("/src/main.ts");
        }
      })();
    </script>
  </body>
</html>
